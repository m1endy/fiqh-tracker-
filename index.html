<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" id="manifestLink" href="">
<link rel="icon" id="faviconLink" href="">

<style>
/* ============================================================
   CSS ПЕРЕМЕННЫЕ — ТЁМНАЯ ТЕМА (по умолчанию)
============================================================ */
:root {
  --bg: #0A1A14;
  --bg2: #0D2019;
  --card: rgba(255,255,255,0.06);
  --card-border: rgba(255,255,255,0.10);
  --card-solid: #112218;
  --nav-bg: rgba(10,26,20,0.92);
  --topbar-bg: rgba(10,26,20,0.94);
  --ink: #F5F0E8;
  --ink2: #C8C0B0;
  --muted: #7A8A80;
  --gold: #D4A853;
  --gold2: #F0C060;
  --gold-wash: rgba(212,168,83,0.12);
  --emerald: #2ECC71;
  --emerald2: #27AE60;
  --emerald-wash: rgba(46,204,113,0.12);
  --emerald-glow: rgba(46,204,113,0.30);
  --line: rgba(255,255,255,0.07);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-sm: 0 2px 10px rgba(0,0,0,0.3);
  --radius: 18px;
  --blur: blur(16px);
  --display-font: 'Amiri', Georgia, serif;
  --body-font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition: .28s cubic-bezier(.4,0,.2,1);
}

/* ============================================================
   СВЕТЛАЯ ТЕМА
============================================================ */
body.light {
  --bg: #FFF8EC;
  --bg2: #F5EDD8;
  --card: #FFFFFF;
  --card-border: rgba(27,94,32,0.10);
  --card-solid: #FFFFFF;
  --nav-bg: rgba(255,248,236,0.96);
  --topbar-bg: rgba(255,248,236,0.96);
  --ink: #1A2A1E;
  --ink2: #3D5A44;
  --muted: #7A8578;
  --gold: #B8860B;
  --gold2: #C9980F;
  --gold-wash: rgba(184,134,11,0.10);
  --emerald: #1B5E20;
  --emerald2: #2E7D32;
  --emerald-wash: rgba(27,94,32,0.10);
  --emerald-glow: rgba(27,94,32,0.20);
  --line: rgba(27,94,32,0.10);
  --shadow: 0 4px 20px rgba(27,94,32,0.10);
  --shadow-sm: 0 2px 8px rgba(27,94,32,0.08);
}

/* ============================================================
   БАЗОВЫЕ СТИЛИ
============================================================ */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body-font);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  padding-bottom: calc(72px + env(safe-area-inset-bottom));
  transition: background var(--transition), color var(--transition);
}

body.dark {
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(46,204,113,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 80%, rgba(212,168,83,0.05) 0%, transparent 50%);
}

.wrap { max-width: 480px; margin: 0 auto; position: relative; }

button { font-family: inherit; border: none; background: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
input { font-family: inherit; }
a { color: inherit; text-decoration: none; }
.hidden { display: none !important; }

/* ============================================================
   GLASSMORPHISM КАРТОЧКИ
============================================================ */
.glass {
  background: var(--card);
  border: 1px solid var(--card-border);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}

body.light .glass {
  background: var(--card);
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
  box-shadow: var(--shadow);
}

/* ============================================================
   ХЕДЕР
============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 30;
  background: var(--topbar-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--line);
  padding: 14px 16px 10px;
  transition: background var(--transition);
}

.topbar-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

.brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }

.brand-mark {
  width: 38px; height: 38px; border-radius: 11px;
  background: linear-gradient(135deg, var(--emerald2), var(--emerald));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 12px var(--emerald-glow);
}

.brand-text h1 {
  font-family: var(--display-font);
  font-size: 16px; line-height: 1.15; margin: 0;
  font-weight: 700; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.brand-text p { margin: 1px 0 0; font-size: 11px; color: var(--muted); }

.topbar-actions { display: flex; gap: 6px; flex-shrink: 0; }

.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  background: var(--card); border: 1px solid var(--card-border);
  font-size: 15px; flex-shrink: 0;
  transition: transform .15s ease, background .2s ease;
  backdrop-filter: var(--blur);
}
.icon-btn:active { transform: scale(0.88); }

.today-line {
  display: flex; align-items: center; gap: 6px;
  margin-top: 10px; font-size: 12px; color: var(--gold);
  font-weight: 600; font-family: var(--body-font);
}

/* ============================================================
   СТАТУС-БАР ПРОГРЕССА
============================================================ */
.progress-header {
  margin: 14px 16px 0;
  padding: 16px 18px;
}
.progress-header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

.prog-ring-wrap {
  position: relative; width: 58px; height: 58px; flex-shrink: 0;
}
.prog-ring-svg { width: 58px; height: 58px; transform: rotate(-90deg); }
.prog-ring-bg { fill: none; stroke: var(--line); stroke-width: 5; }
.prog-ring-fill {
  fill: none; stroke: url(#ringGrad); stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1);
}
.prog-ring-label {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--emerald);
}

.prog-info { flex: 1; }
.prog-info-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; }
.prog-info-main { font-family: var(--display-font); font-size: 20px; color: var(--ink); line-height: 1.2; margin: 2px 0; }
.prog-info-main b { color: var(--emerald); }
.prog-info-sub { font-size: 11.5px; color: var(--muted); }

/* ============================================================
   НАВИГАЦИЯ — НИЖНЯЯ ПАНЕЛЬ
============================================================ */
.bottom-nav {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: flex;
  background: var(--nav-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--line);
  padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
  transition: background var(--transition);
}

.bottom-nav button {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10.5px; color: var(--muted); font-weight: 600; padding: 4px 2px;
  transition: color .2s ease;
  position: relative;
}
.bottom-nav button .nav-ic { font-size: 20px; line-height: 1; }
.bottom-nav button.active { color: var(--emerald); }
.bottom-nav button.active::after {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px; background: var(--emerald); border-radius: 99px;
}

/* ============================================================
   ОСНОВНОЙ КОНТЕНТ
============================================================ */
main { padding: 12px 16px 8px; }
.view { display: flex; flex-direction: column; gap: 12px; }

/* ============================================================
   КАРТОЧКИ УРОКОВ
============================================================ */
.lesson-card {
  position: relative; overflow: hidden;
  padding: 0;
  transition: transform .2s ease, box-shadow .2s ease;
  touch-action: pan-y;
  user-select: none;
}
.lesson-card-inner { padding: 15px 16px 16px; }

/* Активный урок — светящаяся точка слева */
.lesson-card.is-active::before {
  content: '';
  position: absolute; left: -1px; top: 50%; transform: translateY(-50%);
  width: 4px; height: 40%; min-height: 24px;
  background: linear-gradient(180deg, var(--emerald), var(--emerald2));
  border-radius: 0 4px 4px 0;
  box-shadow: 0 0 10px var(--emerald-glow);
}

/* Завершённый урок */
.lesson-card.is-done {
  opacity: 0.65;
  padding: 10px 16px;
}
.lesson-card.is-done .lesson-card-inner { padding: 4px 0; }

/* Выполнена дневная норма — свечение */
.lesson-card.day-complete {
  box-shadow: 0 0 0 1.5px var(--emerald), var(--shadow), 0 0 20px var(--emerald-glow);
}

.card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 10px; }

.card-title-wrap { flex: 1; min-width: 0; }
.card-lesson-num {
  font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted); margin-bottom: 2px;
}
.card-title {
  font-family: var(--display-font); font-weight: 700; font-size: 17px;
  color: var(--ink); line-height: 1.2;
}

.badge {
  font-size: 10px; font-weight: 600; white-space: nowrap;
  padding: 4px 9px; border-radius: 99px; flex-shrink: 0;
}
.badge-active { background: var(--emerald-wash); color: var(--emerald); border: 1px solid rgba(46,204,113,0.2); }
.badge-upcoming { background: var(--gold-wash); color: var(--gold); border: 1px solid rgba(212,168,83,0.2); }
.badge-done { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--line); }

/* Прогресс-бар */
.prog-bar {
  height: 5px; border-radius: 99px;
  background: rgba(255,255,255,0.07);
  margin: 10px 0 12px; overflow: hidden;
}
body.light .prog-bar { background: rgba(0,0,0,0.07); }
.prog-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.prog-fill.emerald { background: linear-gradient(90deg, var(--emerald2), var(--emerald)); }

/* Дни-точки */
.day-dots { display: flex; gap: 7px; margin-bottom: 11px; }
.day-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: rgba(255,255,255,0.10);
  transition: background .25s ease;
}
body.light .day-dot { background: rgba(0,0,0,0.08); }
.day-dot.done { background: var(--emerald2); }
.day-dot.current {
  background: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-wash), 0 0 8px var(--gold);
}

/* Строка «Прочитал» */
.read-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.read-info { font-size: 13px; color: var(--ink2); }
.read-info .day-label { font-weight: 600; color: var(--ink); }
.read-info .count-label { color: var(--emerald); font-weight: 700; font-size: 14.5px; }

.read-actions { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

.btn-undo {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  background: rgba(255,255,255,0.06); border: 1px solid var(--line);
  color: var(--muted); transition: all .15s ease;
}
body.light .btn-undo { background: rgba(0,0,0,0.04); }
.btn-undo:active { transform: scale(0.87); color: var(--gold); }

.btn-read {
  background: linear-gradient(135deg, var(--emerald2), var(--emerald));
  color: #fff; font-weight: 700; font-size: 13.5px;
  padding: 10px 18px; border-radius: 12px;
  box-shadow: 0 4px 14px var(--emerald-glow);
  transition: transform .15s ease, box-shadow .15s ease;
  position: relative; overflow: hidden;
}
.btn-read::after {
  content: ''; position: absolute; inset: 0;
  background: rgba(255,255,255,0); transition: background .3s ease;
}
.btn-read:active { transform: scale(0.93); box-shadow: 0 2px 8px var(--emerald-glow); }
.btn-read.flashing::after { background: rgba(255,255,255,0.35); }

/* Подготовительный этап */
.prep-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.chip {
  flex: 1; min-width: 130px;
  padding: 10px 10px; border-radius: 12px;
  background: var(--gold-wash); color: var(--gold);
  font-size: 12.5px; font-weight: 600; text-align: center;
  border: 1.5px solid transparent;
  transition: transform .12s ease, background .2s ease, color .2s ease, border-color .2s ease;
}
.chip:active { transform: scale(0.96); }
.chip.chip-done {
  background: var(--emerald-wash); color: var(--emerald);
  border-color: rgba(46,204,113,0.3);
}
.hint-text { font-size: 11.5px; color: var(--muted); line-height: 1.5; }

/* Объединение */
.merge-row {
  display: flex; align-items: center; gap: 7px;
  margin-top: 12px; padding-top: 10px;
  border-top: 1px dashed var(--line);
  font-size: 11.5px; color: var(--muted);
}
.merge-row input { accent-color: var(--emerald); width: 15px; height: 15px; }

/* Готовый урок — компактный */
.done-card-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.done-card-title {
  display: flex; align-items: center; gap: 7px;
  font-size: 13.5px; color: var(--ink2);
}
.done-check { font-size: 14px; color: var(--gold); }

/* Группа завершённых */
.done-group-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer;
  border-radius: var(--radius);
}
.done-group-header:active { opacity: 0.8; }
.done-group-title { font-size: 14px; font-weight: 600; color: var(--ink2); }
.done-group-chevron { font-size: 13px; color: var(--muted); transition: transform .3s ease; }
.done-group-chevron.open { transform: rotate(180deg); }
.done-group-body { display: flex; flex-direction: column; gap: 8px; padding: 0 16px 14px; }

/* ============================================================
   АКТИВНЫЙ ИНДИКАТОР (пульсирующая точка)
============================================================ */
.active-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--emerald);
  box-shadow: 0 0 0 0 var(--emerald-glow);
  animation: pulse-dot 2s infinite;
  flex-shrink: 0;
  margin-right: 2px;
}
@keyframes pulse-dot {
  0%   { box-shadow: 0 0 0 0 rgba(46,204,113,0.5); }
  70%  { box-shadow: 0 0 0 6px rgba(46,204,113,0); }
  100% { box-shadow: 0 0 0 0 rgba(46,204,113,0); }
}

/* ============================================================
   ВКЛАДКА СТАТИСТИКИ
============================================================ */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { padding: 16px 15px; }
.stat-icon { font-size: 22px; margin-bottom: 6px; }
.stat-value { font-family: var(--display-font); font-size: 26px; font-weight: 700; color: var(--ink); line-height: 1; }
.stat-value span { font-size: 14px; font-weight: 400; color: var(--muted); }
.stat-label { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

.stat-card-wide { padding: 16px 18px; }
.stat-wide-row { display: flex; align-items: center; gap: 14px; }
.stat-wide-icon { font-size: 28px; flex-shrink: 0; }
.stat-wide-info {}
.stat-wide-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; }
.stat-wide-value { font-family: var(--display-font); font-size: 18px; color: var(--ink); font-weight: 700; margin-top: 2px; }

.streak-bar { margin-top: 12px; }
.streak-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
.streak-track { height: 6px; border-radius: 99px; background: rgba(255,255,255,0.07); overflow: hidden; }
body.light .streak-track { background: rgba(0,0,0,0.07); }
.streak-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--emerald)); transition: width .6s ease; }

/* ============================================================
   СВАЙП-АНИМАЦИИ
============================================================ */
.swipe-hint-right, .swipe-hint-left {
  position: absolute; top: 0; bottom: 0;
  display: flex; align-items: center; padding: 0 18px;
  font-size: 13px; font-weight: 700;
  pointer-events: none; opacity: 0; transition: opacity .2s ease;
  border-radius: var(--radius);
}
.swipe-hint-right { left: 0; background: var(--emerald-wash); color: var(--emerald); }
.swipe-hint-left { right: 0; background: rgba(212,168,83,0.15); color: var(--gold); }

/* ============================================================
   ПЛАВАЮЩИЕ КНОПКИ
============================================================ */
.fab-scroll {
  position: fixed; right: 18px; bottom: calc(80px + env(safe-area-inset-bottom));
  z-index: 35;
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, var(--emerald2), var(--emerald));
  color: #fff; font-size: 20px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px var(--emerald-glow);
  transition: transform .2s ease, opacity .3s ease;
}
.fab-scroll:active { transform: scale(0.88); }
.fab-scroll.hidden-fab { opacity: 0; pointer-events: none; }

.fab-reminder {
  position: fixed; right: 18px; bottom: calc(136px + env(safe-area-inset-bottom));
  z-index: 35;
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--card-border);
  backdrop-filter: var(--blur);
  color: var(--gold); font-size: 19px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  transition: transform .2s ease;
}
.fab-reminder:active { transform: scale(0.88); }
.fab-reminder.notif-set { color: var(--emerald); }

/* ============================================================
   ПУСТОЕ СОСТОЯНИЕ
============================================================ */
.empty-state {
  text-align: center; padding: 40px 18px;
  font-size: 13.5px; line-height: 1.6; color: var(--muted);
}
.empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-state p { margin: 6px 0 0; }

/* ============================================================
   ОВЕРЛЕИ И МОДАЛКИ
============================================================ */
.overlay {
  position: fixed; inset: 0; z-index: 60;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
}

.sheet {
  background: var(--bg2);
  width: 100%; max-width: 480px;
  border-radius: 24px 24px 0 0;
  padding: 6px 22px calc(28px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
  max-height: 90vh; overflow-y: auto;
}
body.light .sheet { background: #FFF8EC; }

.sheet-handle {
  width: 36px; height: 4px; border-radius: 99px;
  background: var(--line); margin: 10px auto 18px;
}

.sheet h2 {
  font-family: var(--display-font); font-size: 22px;
  color: var(--ink); text-align: center; margin: 0 0 6px;
}
.sheet .sheet-sub { text-align: center; color: var(--muted); font-size: 12.5px; margin-bottom: 20px; }

.sheet-steps { list-style: none; padding: 0; margin: 0 0 20px; display: flex; flex-direction: column; gap: 11px; }
.sheet-steps li { display: flex; gap: 11px; align-items: flex-start; font-size: 13.5px; line-height: 1.45; }
.sheet-steps .num {
  width: 24px; height: 24px; border-radi
